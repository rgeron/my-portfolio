<svg width="180" height="50" viewBox="0 0 180 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Spiral of dashed lines forming a C shape -->
  <g stroke="#c93545" stroke-width="2.5" stroke-linecap="round">
    <!-- Outer arc (top part going down) -->
    <line x1="28" y1="3" x2="28" y2="9"/>
    <line x1="22" y1="5" x2="20" y2="11" transform="rotate(-20 21 8)"/>
    <line x1="14" y1="10" x2="11" y2="16" transform="rotate(-10 12 13)"/>
    <line x1="8" y1="18" x2="5" y2="24"/>
    <line x1="5" y1="28" x2="3" y2="34"/>
    <line x1="6" y1="38" x2="8" y2="44"/>
    
    <!-- Second arc -->
    <line x1="34" y1="5" x2="34" y2="11"/>
    <line x1="40" y1="8" x2="42" y2="14"/>
    
    <!-- Middle arc -->
    <line x1="24" y1="12" x2="22" y2="18"/>
    <line x1="17" y1="16" x2="14" y2="22"/>
    <line x1="12" y1="24" x2="10" y2="30"/>
    <line x1="11" y1="34" x2="13" y2="40"/>
    <line x1="17" y1="40" x2="20" y2="46"/>
    
    <!-- Inner arc -->
    <line x1="28" y1="18" x2="26" y2="24"/>
    <line x1="22" y1="24" x2="19" y2="30"/>
    <line x1="18" y1="32" x2="18" y2="38"/>
    <line x1="22" y1="40" x2="26" y2="45"/>
    
    <!-- Additional lines for density -->
    <line x1="32" y1="14" x2="30" y2="20"/>
    <line x1="26" y1="30" x2="25" y2="36"/>
  </g>
  
  <!-- Text "Nicolas" -->
  <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#2d2d2d">Nicolas</text>
  
  <!-- Blue dot -->
  <circle cx="160" cy="32" r="5" fill="#1a4a8c"/>
</svg>
