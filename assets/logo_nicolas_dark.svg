<svg width="220" height="70" viewBox="0 0 220 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Recreating the specific spiral from the user image -->
  <!-- Thick radial dashes in 4 concentric layers -->
  <!-- Center roughly at (35, 35) -->
  
  <defs>
    <style>
      .dash { stroke: #c41e3a; stroke-width: 4; stroke-linecap: round; }
      .text { font-family: system-ui, -apple-system, sans-serif; font-size: 42px; font-weight: 700; fill: #ffffff; }
      .dot { fill: #0056b3; }
    </style>
  </defs>

  <g transform="translate(10, 5)">
    <!-- Layer 1 (Outer) -->
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(-70 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(-55 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(-40 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(-25 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(-10 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(5 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(20 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(35 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(50 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(65 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(80 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(95 35 35)" class="dash" />
    <line x1="30" y1="0" x2="30" y2="8" transform="rotate(110 35 35)" class="dash" />

    <!-- Layer 2 -->
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(-65 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(-48 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(-31 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(-14 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(3 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(20 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(37 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(54 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(71 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(88 35 35)" class="dash" />
    <line x1="30" y1="13" x2="30" y2="19" transform="rotate(105 35 35)" class="dash" />

    <!-- Layer 3 -->
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(-55 35 35)" class="dash" />
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(-35 35 35)" class="dash" />
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(-15 35 35)" class="dash" />
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(5 35 35)" class="dash" />
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(25 35 35)" class="dash" />
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(45 35 35)" class="dash" />
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(65 35 35)" class="dash" />
    <line x1="30" y1="24" x2="30" y2="28" transform="rotate(85 35 35)" class="dash" />

     <!-- Layer 4 (Inner) -->
    <line x1="30" y1="32" x2="30" y2="35" transform="rotate(-40 35 35)" class="dash" />
    <line x1="30" y1="32" x2="30" y2="35" transform="rotate(-15 35 35)" class="dash" />
    <line x1="30" y1="32" x2="30" y2="35" transform="rotate(10 35 35)" class="dash" />
    <line x1="30" y1="32" x2="30" y2="35" transform="rotate(35 35 35)" class="dash" />
    <line x1="30" y1="32" x2="30" y2="35" transform="rotate(60 35 35)" class="dash" />

  </g>

  <text x="75" y="48" class="text">Nicolas</text>
  <circle cx="213" cy="42" r="6" class="dot"/>
</svg>
